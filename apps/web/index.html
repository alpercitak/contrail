<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./src/styles/global.css" />
  <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
  <script src="./src/main.ts" type="module"></script>
</head>
<body>
  <div id="map"></div>
  <div id="hud">
    <div class="hud-logo">contrail</div>
    <div class="hud-stats">
      <div class="stat">
        <div class="stat-value" id="count">0</div>
        <div class="stat-label">Aircraft</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="updates">0</div>
        <div class="stat-label">Updates/min</div>
      </div>
    </div>
  </div>
  <div id="status">
    <div class="status-dot" id="dot"></div>
    <span id="status-text">connecting</span>
  </div>
  <div id="panel">
  <div class="panel-header">
    <div>
      <div class="panel-callsign" id="p-callsign">—</div>
      <div class="panel-icao" id="p-icao">—</div>
    </div>
    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body">
    <div class="panel-field">
      <div class="field-label">Altitude</div>
      <div class="field-value" id="p-alt">—</div>
    </div>
    <div class="panel-field">
      <div class="field-label">Speed</div>
      <div class="field-value" id="p-spd">—</div>
    </div>
    <div class="panel-field">
      <div class="field-label">Heading</div>
      <div class="field-value" id="p-hdg">—</div>
    </div>
    <div class="panel-field">
      <div class="field-label">Position</div>
      <div class="field-value" id="p-pos">—</div>
    </div>
  </div>
  </div>
</body>
</html>

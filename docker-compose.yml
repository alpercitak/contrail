services:
  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3002:3002"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3002"
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3001"
    depends_on:
      redis:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      FLEET_SIZE: "150"
      TICK_MS: "5000"
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_PROXY: http://api:3002
      VITE_WS_PROXY: ws://gateway:3001
    depends_on:
      - gateway
